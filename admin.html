<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — TrendPulse AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <style>
    .admin-login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #6C3BD2 0%, #FF3366 100%);
      padding: 20px;
    }
    .admin-login-card {
      background: white;
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .admin-login-card .logo {
      justify-content: center;
      font-size: 1.5rem;
      margin-bottom: 8px;
    }
    .admin-login-card h1 {
      text-align: center;
      font-size: 1.5rem;
      margin-bottom: 4px;
    }
    .admin-login-card p {
      text-align: center;
      color: var(--gray-600);
      margin-bottom: 32px;
      font-size: 0.9rem;
    }
    .login-error {
      background: #fef2f2;
      color: #dc2626;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
    }
    .login-error.show { display: block; }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 0.9rem;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--gray-200);
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
    }
    .admin-login-card .btn-accent {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
    }
    .admin-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 0.8rem;
      color: var(--gray-500);
    }
    .setup-hint {
      background: #f0f9ff;
      border: 1px solid #bae6fd;
      border-radius: 8px;
      padding: 12px;
      font-size: 0.8rem;
      color: #0369a1;
      margin-bottom: 20px;
      display: none;
    }
    .setup-hint.show { display: block; }
    .setup-hint code {
      background: #e0f2fe;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.75rem;
    }
  </style>
</head>
<body>
  <div class="admin-login-page">
    <div class="admin-login-card">
      <div class="logo" style="justify-content:center;margin-bottom:16px;">
        <div class="logo-icon">⚡</div>
        <span>TrendPulse AI</span>
      </div>
      <h1>Store Admin</h1>
      <p>Enter your password to manage your store</p>

      <div id="setup-hint" class="setup-hint">
        🔑 <strong>First time?</strong> Set your admin password by adding <code>?setup=YOUR_PASSWORD</code> to this page URL, then log in with it.
      </div>

      <div id="login-error" class="login-error">❌ Incorrect password. Try again.</div>

      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="password">Admin Password</label>
          <input type="password" id="password" placeholder="Enter your admin password" required autofocus>
        </div>
        <button type="submit" class="btn btn-accent btn-lg">🔐 Log In</button>
      </form>

      <div class="admin-footer">
        ⚡ TrendPulse AI v1.0
      </div>
    </div>
  </div>

  <script>
    // Check for setup parameter
    const urlParams = new URLSearchParams(window.location.search);
    const setupPw = urlParams.get('setup');
    if (setupPw) {
      localStorage.setItem('trendpulse_admin_password', setupPw);
      document.getElementById('setup-hint').classList.add('show');
      document.getElementById('setup-hint').innerHTML = '✅ <strong>Password set!</strong> Log in with: <code>' + setupPw + '</code>';
      // Clean URL
      window.history.replaceState({}, document.title, '/admin.html');
    }

    // Show setup hint if no password is set
    if (!localStorage.getItem('trendpulse_admin_password')) {
      document.getElementById('setup-hint').classList.add('show');
    }

    function handleLogin(e) {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const stored = localStorage.getItem('trendpulse_admin_password') || 'admin123'; // default fallback
      
      if (password === stored) {
        localStorage.setItem('trendpulse_admin_logged_in', 'true');
        window.location.href = '/admin/dashboard.html';
      } else {
        document.getElementById('login-error').classList.add('show');
        document.getElementById('password').value = '';
      }
    }
  </script>
</body>
</html>
